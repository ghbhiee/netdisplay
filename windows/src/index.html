<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>NetDisplay</title>
  <style>
    /* 设计 tokens 与 docs/design/ 一致——接收窗口和主面板必须是同一套视觉。 */
    [data-theme="light"]{--bg:#E9EBEE;--panel:#FFFFFF;--panel2:#F5F6F8;--text:#1B1E23;--sub:#6E7681;--line:#E2E4E8;--accent:#3B6FE0;--recv:#0F9D8C;--ok:#1D9E55;--err:#D5453C}
    [data-theme="dark"]{--bg:#141619;--panel:#1F2226;--panel2:#282C31;--text:#E9EBEE;--sub:#98A0A9;--line:#34383E;--accent:#5C88E8;--recv:#31BFAD;--ok:#3DBE74;--err:#E4655C}

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--panel); color: var(--text);
      font: 13px/1.45 "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
    }

    /* 标题栏：设计 §5「NetDisplay — {设备名} 的画面」。可拖动，按钮除外。 */
    #titlebar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-bottom: 1px solid var(--line);
      -webkit-app-region: drag; flex: 0 0 auto;
    }
    #winTitle { font-size: 12px; font-weight: 600; }
    #winBtns { margin-left: auto; display: flex; gap: 12px; color: var(--sub);
      font-size: 11px; -webkit-app-region: no-drag; }
    #winBtns span { cursor: pointer; }
    #winBtns span:hover { color: var(--text); }
    body.fullscreen #titlebar { display: none; }

    #stage { flex: 1; position: relative; background: #000;
      display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #video { display: block; background: #000; }
    #video.dimmed { filter: brightness(.2) saturate(.4); }

    /* 待命：窗口通常是隐藏的，这里只覆盖「已显示但首帧未到」的空档 */
    #idle { position: absolute; inset: 0; display: none; z-index: 5;
      align-items: center; justify-content: center; flex-direction: column; gap: 8px;
      background: rgba(0,0,0,.5); color: #fff; }
    #idle .big { font-size: 19px; font-weight: 600; letter-spacing: 1px; }
    #idle .small { font-size: 12px; opacity: .65; }

    /* 左下角悬浮徽标：设计 §5「接收中 · 直连 · 3ms」 */
    #badge { position: absolute; left: 10px; bottom: 10px; z-index: 10;
      font-size: 11px; color: rgba(255,255,255,.75); background: rgba(0,0,0,.45);
      border-radius: 6px; padding: 4px 9px; pointer-events: none; }

    #toolbar { position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 15; opacity: 0; transition: opacity .15s; }
    #toolbar.show { opacity: 1; }
    #toolbar button { padding: 6px 14px; border: 1px solid rgba(255,255,255,.18);
      border-radius: 6px; background: rgba(32,32,32,.9); color: #fff; font-size: 12px;
      cursor: pointer; font-family: inherit; backdrop-filter: blur(8px); }
    #toolbar button:hover { background: rgba(60,60,60,.95); }

    #srcLabel { position: absolute; top: 10px; left: 12px; z-index: 10; display: none;
      font-size: 11px; color: rgba(255,255,255,.5); pointer-events: none; }
    #overlay { position: absolute; top: 10px; right: 12px; display: none; z-index: 10;
      background: rgba(0,0,0,.6); border-radius: 6px; padding: 5px 9px;
      font: 11px/1.5 Consolas, monospace; color: #7ee787; pointer-events: none; }
    #hint { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      display: none; z-index: 10; font-size: 11px; color: rgba(255,255,255,.35); }
    #status { display: none; }
  </style>
</head>
<body data-theme="dark">
  <div id="titlebar">
    <div id="winTitle">NetDisplay</div>
    <div id="winBtns"><span id="winMin">—</span><span id="winClose">✕</span></div>
  </div>

  <div id="stage">
    <canvas id="video"></canvas>
    <div id="idle">
      <div class="big">等待投射…</div>
      <div class="small">连接保持中 · 对方开始投射即自动显示</div>
    </div>
    <div id="toolbar">
      <button id="btnBounce">⏏ 弹回对方</button>
      <button id="btnStop">■ 停止投射</button>
    </div>
    <div id="srcLabel"></div>
    <div id="overlay"></div>
    <div id="badge"></div>
    <div id="hint">长按 Esc 断开 · F1 统计</div>
  </div>

  <!-- 引擎把人话状态写这里；窗口不显示它，headless 时转 stdout 供 CLI 联调 -->
  <div id="status"></div>

  <script src="renderer.js"></script>
</body>
</html>
